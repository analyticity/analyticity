services:
  app:
    build: .
    env_file: .env
    depends_on:
      - local_db
    networks:
      - local
      - central

  local_db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${LOCAL_DB_NAME}
      POSTGRES_USER: ${LOCAL_DB_USER}
      POSTGRES_PASSWORD: ${LOCAL_DB_PASSWORD}
    volumes:
      - local_db_data:/var/lib/postgresql/data
    networks:
      - local

networks:
  local:
  central:
    external: true
    name: analyticity_central

volumes:
  local_db_data:
