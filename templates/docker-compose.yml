name: analyticity-__CITY__

x-common-env: &common-env
  env_file: .env

services:

  # ── City-local database ──────────────────────────────────────────────────────

  local_db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB_BRNO}
      POSTGRES_USER: ${POSTGRES_USER_BRNO}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_BRNO}
    volumes:
      - local_db_data:/var/lib/postgresql/data
    networks:
      - analyticity-network

  # ── Application services ─────────────────────────────────────────────────────

  api:
    image: ${REGISTRY:-ghcr.io/analyticity}/api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    <<: *common-env
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      - local_db
    networks:
      - analyticity-network

  traffic-jams-backend:
    image: ${REGISTRY:-ghcr.io/analyticity}/traffic-jams-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    <<: *common-env
    ports:
      - "${TRAFFIC_BACKEND_PORT:-8081}:8081"
    depends_on:
      - local_db
    networks:
      - analyticity-network

  admin-backend:
    image: ${REGISTRY:-ghcr.io/analyticity}/admin-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    <<: *common-env
    ports:
      - "${ADMIN_BACKEND_PORT:-8082}:8082"
    depends_on:
      - api
    networks:
      - analyticity-network

  bp-ux-ui:
    image: ${REGISTRY:-ghcr.io/analyticity}/bp-ux-ui:${IMAGE_TAG:-latest}
    restart: unless-stopped
    <<: *common-env
    ports:
      - "${UI_PORT:-80}:80"
    depends_on:
      - api
    networks:
      - analyticity-network

networks:
  analyticity-network:
    external: true

volumes:
  local_db_data:
