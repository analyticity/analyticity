name: analyticity-orp_most

include:
  - path: ../../infrastructure/docker-compose.yml
    project_directory: ../../sources/data_model/infrastructure/compose/dev

x-common-env: &common-env
  env_file: .env

services:

  # ── Application services ─────────────────────────────────────────────────────
  # No depends_on — app services start immediately and connect to DB/Kafka when
  # available. API falls back to example data until DB is ready, then switches
  # automatically without restart.

  api:
    image: ${REGISTRY:-ghcr.io/analyticity}/api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    <<: *common-env
    ports:
      - "${API_PORT:-8101}:8000"
    networks:
      - default
      - analyticity-network

  traffic-jams-backend:
    image: ${REGISTRY:-ghcr.io/analyticity}/traffic-jams-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    <<: *common-env
    ports:
      - "${TRAFFIC_BACKEND_PORT:-8102}:8081"
    networks:
      - default
      - analyticity-network

  admin-backend:
    image: ${REGISTRY:-ghcr.io/analyticity}/admin-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    <<: *common-env
    ports:
      - "${ADMIN_BACKEND_PORT:-8103}:8082"
    networks:
      - default
      - analyticity-network

  bp-ux-ui:
    image: ${REGISTRY:-ghcr.io/analyticity}/bp-ux-ui:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:8101/api/v1}
      VITE_API_BACKEND_URL: ${VITE_API_BACKEND_URL:-http://localhost:8103/}
      VITE_APP_CENTER_LON: ${VITE_APP_CENTER_LON}
      VITE_APP_CENTER_LAT: ${VITE_APP_CENTER_LAT}
      VITE_APP_CITY: ${VITE_APP_CITY}
    ports:
      - "${UI_PORT:-8100}:80"
    networks:
      - analyticity-network

networks:
  analyticity-network:
    external: true
